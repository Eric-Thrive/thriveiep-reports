<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>C2A Battery Flow - Code Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; overflow: hidden; }

  .layout { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 1fr auto; height: 100vh; }

  /* Sidebar */
  .sidebar { grid-row: 1 / 3; background: #181b24; border-right: 1px solid #2d3348; overflow-y: auto; padding: 16px; }
  .sidebar h2 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .sidebar h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 8px; }

  /* Presets */
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
  .preset-btn { background: #1e2230; border: 1px solid #2d3348; color: #94a3b8; padding: 8px 6px; border-radius: 6px; cursor: pointer; font-size: 11px; text-align: center; transition: all 0.15s; }
  .preset-btn:hover { background: #252a3a; border-color: #3b82f6; color: #e2e8f0; }
  .preset-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #60a5fa; }

  /* Layer toggles */
  .layer-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .layer-toggle:hover { background: #1e2230; }
  .layer-toggle input { accent-color: #3b82f6; }
  .layer-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .layer-label { font-size: 13px; color: #cbd5e1; }

  /* Connection toggles */
  .conn-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .conn-toggle:hover { background: #1e2230; }
  .conn-toggle input { accent-color: #3b82f6; }
  .conn-line { width: 20px; height: 2px; flex-shrink: 0; border-radius: 1px; }
  .conn-label { font-size: 13px; color: #cbd5e1; }

  /* Comments */
  .comments-section { margin-top: 16px; border-top: 1px solid #2d3348; padding-top: 12px; }
  .comment-count { font-size: 12px; color: #64748b; margin-bottom: 8px; }
  .comment-item { background: #1e2230; border: 1px solid #2d3348; border-radius: 6px; padding: 10px; margin-bottom: 6px; position: relative; }
  .comment-target { font-size: 11px; font-weight: 600; color: #60a5fa; margin-bottom: 2px; }
  .comment-file { font-size: 10px; color: #475569; font-family: 'SF Mono', 'Fira Code', monospace; margin-bottom: 4px; }
  .comment-text { font-size: 12px; color: #cbd5e1; line-height: 1.4; }
  .comment-delete { position: absolute; top: 6px; right: 6px; background: none; border: none; color: #475569; cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 3px; }
  .comment-delete:hover { color: #ef4444; background: #1a1a2e; }

  /* Canvas area */
  .canvas-area { position: relative; overflow: hidden; background: #12141d; }
  .canvas-area svg { width: 100%; height: 100%; }
  .zoom-controls { position: absolute; bottom: 16px; right: 16px; display: flex; gap: 4px; }
  .zoom-btn { background: #1e2230; border: 1px solid #2d3348; color: #94a3b8; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .zoom-btn:hover { background: #252a3a; color: #e2e8f0; }

  /* Legend */
  .legend { position: absolute; bottom: 16px; left: 16px; background: #181b24ee; border: 1px solid #2d3348; border-radius: 8px; padding: 10px 14px; display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .legend-line { width: 24px; height: 0; border-top-width: 2px; border-top-style: solid; }

  /* Prompt area */
  .prompt-area { grid-column: 2; background: #181b24; border-top: 1px solid #2d3348; padding: 12px 16px; max-height: 200px; overflow-y: auto; }
  .prompt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .prompt-title { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .copy-btn { background: #1e3a5f; border: 1px solid #2d5a9e; color: #60a5fa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .copy-btn:hover { background: #254a7a; }
  .copy-btn.copied { background: #065f46; border-color: #10b981; color: #34d399; }
  .prompt-text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #cbd5e1; line-height: 1.5; white-space: pre-wrap; }

  /* Comment modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: #000000aa; z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #1e2230; border: 1px solid #2d3348; border-radius: 12px; padding: 20px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 16px; color: #e2e8f0; margin-bottom: 4px; }
  .modal .modal-file { font-size: 12px; color: #64748b; font-family: monospace; margin-bottom: 12px; }
  .modal textarea { width: 100%; height: 80px; background: #12141d; border: 1px solid #2d3348; color: #e2e8f0; border-radius: 6px; padding: 10px; font-size: 13px; resize: vertical; font-family: inherit; }
  .modal textarea:focus { outline: none; border-color: #3b82f6; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .modal-cancel { background: #1e2230; border: 1px solid #2d3348; color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .modal-save { background: #1e3a5f; border: 1px solid #2d5a9e; color: #60a5fa; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .modal-save:hover { background: #254a7a; }

  /* Node tooltip */
  .node-tooltip { display: none; position: fixed; background: #1e2230; border: 1px solid #3b82f6; border-radius: 8px; padding: 10px 14px; z-index: 50; max-width: 300px; pointer-events: none; }
  .node-tooltip.active { display: block; }
  .node-tooltip h4 { font-size: 13px; color: #e2e8f0; margin-bottom: 2px; }
  .node-tooltip p { font-size: 11px; color: #94a3b8; line-height: 1.4; }
  .node-tooltip .tt-file { font-family: monospace; color: #60a5fa; font-size: 10px; }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>C2A Battery Flow</h2>
    <div id="presets-container">
      <h3>Views</h3>
      <div class="preset-grid" id="presets"></div>
    </div>
    <div id="layers-container">
      <h3>Layers</h3>
      <div id="layer-toggles"></div>
    </div>
    <div id="conns-container">
      <h3>Connections</h3>
      <div id="conn-toggles"></div>
    </div>
    <div class="comments-section">
      <h3>Comments <span class="comment-count" id="comment-count">(0)</span></h3>
      <div id="comments-list"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvas-area">
    <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="legend" id="legend"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">&minus;</button>
      <button class="zoom-btn" id="zoom-reset" style="font-size:11px">Fit</button>
    </div>
  </div>

  <!-- Prompt output -->
  <div class="prompt-area">
    <div class="prompt-header">
      <span class="prompt-title">Generated Prompt</span>
      <button class="copy-btn" id="copy-btn">Copy Prompt</button>
    </div>
    <div class="prompt-text" id="prompt-output"></div>
  </div>
</div>

<!-- Comment modal -->
<div class="modal-overlay" id="comment-modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="modal-file" id="modal-file"></div>
    <textarea id="modal-textarea" placeholder="What would you like to change or note about this component?"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel-btn">Cancel</button>
      <button class="modal-save" id="modal-save-btn">Add Comment</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="node-tooltip" id="tooltip">
  <h4 id="tt-label"></h4>
  <div class="tt-file" id="tt-file"></div>
  <p id="tt-desc"></p>
</div>

<script>
// ── Architecture Data ─────────────────────────────────────────────

const LAYERS = {

  pages:    { label: 'Pages & Views',    color: '#c4b5fd', fill: '#3b1f7a', border: '#8b5cf6' },
  api:      { label: 'API Routes',       color: '#fcd34d', fill: '#78350f', border: '#f59e0b' },

const nodes = [
  // Entry & Auth layer
  { id: 'landing',      label: 'C2A Landing',        subtitle: 'C2ALandingPage.tsx',         x: 80,  y: 40,  w: 140, h: 48, layer: 'entry', desc: 'PIN-based login. Students enter email then PIN code. No password auth.' },
  { id: 'auth-lookup',  label: 'Auth Lookup',         subtitle: '/api/auth/lookup',           x: 280, y: 40,  w: 130, h: 48, layer: 'entry', desc: 'POST identity lookup by email/username. Returns user if C2A-eligible.' },
  { id: 'auth-pin',     label: 'PIN Login',           subtitle: '/api/auth/pin/login',        x: 450, y: 40,  w: 130, h: 48, layer: 'entry', desc: 'POST PIN verification. Creates session on success.' },

  // Pages layer (onboarding + sprint flow)
  { id: 'welcome',      label: 'Welcome',             subtitle: 'WelcomePage.tsx',            x: 80,  y: 130, w: 130, h: 48, layer: 'pages', desc: '3-screen onboarding carousel. Consent collection.' },
  { id: 'home',         label: 'Learner Home',        subtitle: 'LearnerHomePage.tsx',        x: 260, y: 130, w: 140, h: 48, layer: 'pages', desc: 'Sprint dashboard hub. Shows 3 sprint cards with progress.' },
  { id: 'sprint-overview', label: 'Sprint Overview',  subtitle: 'SprintOverviewPage.tsx',     x: 450, y: 130, w: 150, h: 48, layer: 'pages', desc: 'Pre-sprint orientation. Shows sprint label, context, time estimate.' },
  { id: 'sprint-complete', label: 'Sprint Complete',   subtitle: 'SprintCompletePage.tsx',    x: 860, y: 130, w: 155, h: 48, layer: 'pages', desc: 'Celebration screen. Trophy + motivational message. Routes to next sprint or processing.' },

  // Survey Engine layer
  { id: 'assessment',   label: 'Assessment Page',     subtitle: 'AssessmentPage.tsx',         x: 80,  y: 230, w: 155, h: 48, layer: 'survey', desc: 'Wrapper. Loads sprint items + saved responses, resumes at first unanswered.' },
  { id: 'survey-engine', label: 'Survey Engine',       subtitle: 'SurveyEngine.tsx',          x: 300, y: 230, w: 155, h: 48, layer: 'survey', desc: 'Core item-by-item navigation. Instrument boundary detection. Save-on-next.' },
  { id: 'likert',       label: 'Likert Gauge',        subtitle: 'LikertGauge.tsx',            x: 520, y: 230, w: 130, h: 48, layer: 'survey', desc: '5-point Likert response widget. Touch-optimized for mobile.' },
  { id: 'transition',   label: 'Transition Card',     subtitle: 'TransitionCard.tsx',         x: 700, y: 230, w: 145, h: 48, layer: 'survey', desc: 'Micro-break between instruments. Shown at instrument boundaries.' },
  { id: 'boundary',     label: 'Boundary Utils',      subtitle: 'instrument-boundary.ts',     x: 700, y: 300, w: 150, h: 48, layer: 'survey', desc: 'Pure utility. isInstrumentBoundary() detects when next item is new instrument.' },
  { id: 'save-exit',    label: 'Save & Exit',         subtitle: 'SaveExitModal.tsx',          x: 520, y: 300, w: 135, h: 48, layer: 'survey', desc: 'Modal with save/exit/notification opt-in. Triggers response persistence.' },

  // API Routes layer
  { id: 'api-session',  label: 'Session API',         subtitle: '/api/c2a/.../session',       x: 80,  y: 400, w: 145, h: 48, layer: 'api', desc: 'GET: get or create assessment session for current student + timepoint.' },
  { id: 'api-instruments', label: 'Instruments API',  subtitle: '/api/c2a/.../instruments',    x: 270, y: 400, w: 155, h: 48, layer: 'api', desc: 'GET: fetch SurveyItem[] for a sprint. Returns items with response_format.' },
  { id: 'api-responses', label: 'Responses API',      subtitle: '/api/c2a/.../responses',      x: 470, y: 400, w: 150, h: 48, layer: 'api', desc: 'GET saved responses, POST new response. Each response: itemId, instrumentId, rawValue.' },
  { id: 'api-progress', label: 'Progress API',        subtitle: '/api/c2a/.../progress',       x: 670, y: 400, w: 145, h: 48, layer: 'api', desc: 'GET sprint progress. Returns answered/total for each sprint.' },
  { id: 'api-scoring',  label: 'Trigger Scoring',     subtitle: '/api/c2a/.../trigger-scoring', x: 860, y: 400, w: 155, h: 48, layer: 'api', desc: 'POST: initiates scoring pipeline after all 3 sprints complete.' },

  { id: 'scoring-svc',  label: 'Scoring Service',     subtitle: 'scoring-service.ts',         x: 80,  y: 500, w: 150, h: 48, layer: 'services', desc: 'Raw responses to subscale scores to skill scores (1-100). Flags clinical concerns.' },

  // Admin layer

  { id: 'admin-timepoints', label: 'Timepoint Mgmt',  subtitle: 'TimepointListPage.tsx',       x: 280, y: 700, w: 155, h: 48, layer: 'admin', desc: 'Create/edit assessment windows. Assign instruments to sprints.' },

const connections = [
  // Entry flow
  { from: 'landing', to: 'auth-lookup', type: 'apiCall', label: 'POST lookup' },
  { from: 'landing', to: 'auth-pin', type: 'apiCall', label: 'POST PIN' },
  { from: 'landing', to: 'welcome', type: 'navigation', label: 'on auth' },

  // Onboarding flow

  // Assessment flow
  { from: 'assessment', to: 'survey-engine', type: 'dependency', label: 'renders' },

  { from: 'survey-engine', to: 'boundary', type: 'dependency', label: 'checks' },

  { from: 'home', to: 'c2a-copy', type: 'dependency', label: 'text strings' },

  { from: 'report-flow', to: 'db-scores', type: 'dataflow', label: 'reads scores' },

  { from: 'admin-roster', to: 'results', type: 'event', label: 'unlock' },
  { from: 'admin-timepoints', to: 'registry', type: 'dependency', label: 'configures' },

  { from: 'batch-import', to: 'landing', type: 'event', label: 'invite emails' },
  { from: 'coach-view', to: 'db-scores', type: 'dataflow', label: 'reads' },
  { from: 'coach-view', to: 'results', type: 'event', label: 'unlock' },

// ── State ─────────────────────────────────────────────────────────

const DEFAULTS = {
  preset: 'full',
  layers: Object.fromEntries(Object.keys(LAYERS).map(k => [k, true])),
  connTypes: Object.fromEntries(Object.keys(CONN_TYPES).map(k => [k, true])),
};

const state = {
  preset: 'full',
  layers: { ...DEFAULTS.layers },
  connTypes: { ...DEFAULTS.connTypes },
  comments: [],
  zoom: 1,
  modalNode: null,
};

const PRESETS = {
  full:       { label: 'Full System',    layers: { entry: true, survey: true, pages: true, api: true, services: true, data: true, admin: true } },
  student:    { label: 'Student Path',   layers: { entry: true, survey: true, pages: true, api: false, services: false, data: false, admin: false } },
  assessment: { label: 'Assessment',     layers: { entry: false, survey: true, pages: false, api: true, services: false, data: false, admin: false } },
  scoring:    { label: 'Scoring Flow',   layers: { entry: false, survey: false, pages: false, api: true, services: true, data: true, admin: false } },
  backend:    { label: 'Backend',        layers: { entry: false, survey: false, pages: false, api: true, services: true, data: true, admin: false } },
  admin:      { label: 'Admin/Coach',    layers: { entry: false, survey: false, pages: false, api: false, services: true, data: true, admin: true } },
};

// ── DOM references ────────────────────────────────────────────────

const svgEl = document.getElementById('diagram');
const tooltipEl = document.getElementById('tooltip');
const promptOutput = document.getElementById('prompt-output');
const presetsEl = document.getElementById('presets');
const layerTogglesEl = document.getElementById('layer-toggles');
const connTogglesEl = document.getElementById('conn-toggles');
const commentsListEl = document.getElementById('comments-list');
const commentCountEl = document.getElementById('comment-count');
const legendEl = document.getElementById('legend');
const commentModal = document.getElementById('comment-modal');
const modalTitle = document.getElementById('modal-title');
const modalFile = document.getElementById('modal-file');
const modalTextarea = document.getElementById('modal-textarea');
const copyBtn = document.getElementById('copy-btn');

// ── Rendering ─────────────────────────────────────────────────────

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.textContent;
}

function createTextNode(text) {
  return document.createTextNode(text);
}

function renderControls() {
  // Presets
  while (presetsEl.firstChild) presetsEl.removeChild(presetsEl.firstChild);
  Object.entries(PRESETS).forEach(function([k, v]) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (state.preset === k ? ' active' : '');
    btn.textContent = v.label;
    btn.addEventListener('click', function() { setPreset(k); });
    presetsEl.appendChild(btn);
  });

  // Layer toggles
  while (layerTogglesEl.firstChild) layerTogglesEl.removeChild(layerTogglesEl.firstChild);
  Object.entries(LAYERS).forEach(function([k, v]) {
    const label = document.createElement('label');
    label.className = 'layer-toggle';

    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = state.layers[k];
    input.addEventListener('change', function() { toggleLayer(k); });

    const swatch = document.createElement('span');
    swatch.className = 'layer-swatch';
    swatch.style.background = v.color;

    const text = document.createElement('span');
    text.className = 'layer-label';
    text.textContent = v.label;

    label.appendChild(input);
    label.appendChild(swatch);
    label.appendChild(text);
    layerTogglesEl.appendChild(label);
  });

  // Connection toggles
  while (connTogglesEl.firstChild) connTogglesEl.removeChild(connTogglesEl.firstChild);
  Object.entries(CONN_TYPES).forEach(function([k, v]) {
    const label = document.createElement('label');
    label.className = 'conn-toggle';

    const input = document.createElement('input');
    input.type = 'checkbox';
    input.checked = state.connTypes[k];
    input.addEventListener('change', function() { toggleConn(k); });

    const line = document.createElement('span');
    line.className = 'conn-line';
    line.style.background = v.color;
    if (v.dash) {
      line.style.background = 'repeating-linear-gradient(90deg,' + v.color + ' 0,' + v.color + ' 4px,transparent 4px,transparent 7px)';
    }

    const text = document.createElement('span');
    text.className = 'conn-label';
    text.textContent = v.label;

    label.appendChild(input);
    label.appendChild(line);
    label.appendChild(text);
    connTogglesEl.appendChild(label);
  });

  // Legend
  while (legendEl.firstChild) legendEl.removeChild(legendEl.firstChild);
  Object.entries(LAYERS).filter(function([k]) { return state.layers[k]; }).forEach(function([k, v]) {
    const item = document.createElement('span');
    item.className = 'legend-item';
    const sw = document.createElement('span');
    sw.className = 'legend-swatch';
    sw.style.background = v.fill;
    sw.style.border = '1px solid ' + v.border;
    item.appendChild(sw);
    item.appendChild(createTextNode(v.label));
    legendEl.appendChild(item);
  });
  Object.entries(CONN_TYPES).filter(function([k]) { return state.connTypes[k]; }).forEach(function([k, v]) {
    const item = document.createElement('span');
    item.className = 'legend-item';
    const ln = document.createElement('span');
    ln.className = 'legend-line';
    ln.style.borderColor = v.color;
    if (v.dash) ln.style.borderStyle = 'dashed';
    item.appendChild(ln);
    item.appendChild(createTextNode(v.label));
    legendEl.appendChild(item);
  });
}

function renderDiagram() {
  const visibleNodes = nodes.filter(function(n) { return state.layers[n.layer]; });
  const visibleNodeIds = new Set(visibleNodes.map(function(n) { return n.id; }));
  const visibleConns = connections.filter(function(c) {
    return state.connTypes[c.type] && visibleNodeIds.has(c.from) && visibleNodeIds.has(c.to);
  });
  const commentedIds = new Set(state.comments.map(function(c) { return c.target; }));

  // Calculate viewBox
  const padding = 40;
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  if (visibleNodes.length === 0) { minX = 0; minY = 0; maxX = 1100; maxY = 800; }
  visibleNodes.forEach(function(n) {
    minX = Math.min(minX, n.x - 10);
    minY = Math.min(minY, n.y - 10);
    maxX = Math.max(maxX, n.x + n.w + 10);
    maxY = Math.max(maxY, n.y + n.h + 10);
  });
  const vbW = maxX - minX + padding * 2;
  const vbH = maxY - minY + padding * 2;

  // Build SVG using DOM methods
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
  svgEl.setAttribute('viewBox', (minX - padding) + ' ' + (minY - padding) + ' ' + vbW + ' ' + vbH);

  // Defs with arrow markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  Object.entries(CONN_TYPES).forEach(function([k, v]) {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'arrow-' + k);
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('refX', '7');
    marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 8 3, 0 6');
    poly.setAttribute('fill', v.color);
    poly.setAttribute('opacity', '0.8');
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  // Draw connections
  visibleConns.forEach(function(c) {
    const from = nodes.find(function(n) { return n.id === c.from; });
    const to = nodes.find(function(n) { return n.id === c.to; });
    const ct = CONN_TYPES[c.type];

    const fx = from.x + from.w / 2;
    const fy = from.y + from.h / 2;
    const tx = to.x + to.w / 2;
    const ty = to.y + to.h / 2;

    var x1, y1, x2, y2;
    const dx = tx - fx, dy = ty - fy;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0) { x1 = from.x + from.w; y1 = fy; x2 = to.x; y2 = ty; }
      else { x1 = from.x; y1 = fy; x2 = to.x + to.w; y2 = ty; }
    } else {
      if (dy > 0) { x1 = fx; y1 = from.y + from.h; x2 = tx; y2 = to.y; }
      else { x1 = fx; y1 = from.y; x2 = tx; y2 = to.y + to.h; }
    }

    const cx1 = x1 + (x2 - x1) * 0.4;
    const cy1 = y1;
    const cx2 = x1 + (x2 - x1) * 0.6;
    const cy2 = y2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + cx1 + ',' + cy1 + ' ' + cx2 + ',' + cy2 + ' ' + x2 + ',' + y2);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', ct.color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('stroke-opacity', '0.5');
    if (ct.dash) path.setAttribute('stroke-dasharray', ct.dash);
    path.setAttribute('marker-end', 'url(#arrow-' + c.type + ')');
    svgEl.appendChild(path);

    if (c.label) {
      const lx = (x1 + x2) / 2;
      const ly = (y1 + y2) / 2 - 6;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(lx));
      text.setAttribute('y', String(ly));
      text.setAttribute('fill', ct.color);
      text.setAttribute('font-size', '9');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('opacity', '0.7');
      text.setAttribute('font-family', 'system-ui');
      text.textContent = c.label;
      svgEl.appendChild(text);
    }
  });

  // Draw nodes
  visibleNodes.forEach(function(n) {
    const l = LAYERS[n.layer];
    const hasComment = commentedIds.has(n.id);
    const strokeW = hasComment ? 2.5 : 1.5;
    const strokeColor = hasComment ? '#f59e0b' : l.border;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', function(e) { showTooltip(e, n.id); });
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', function() { openModal(n.id); });

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(n.x));
    rect.setAttribute('y', String(n.y));
    rect.setAttribute('width', String(n.w));
    rect.setAttribute('height', String(n.h));
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', l.fill);
    rect.setAttribute('stroke', strokeColor);
    rect.setAttribute('stroke-width', String(strokeW));
    rect.setAttribute('opacity', '0.95');
    g.appendChild(rect);

    const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    title.setAttribute('x', String(n.x + n.w / 2));
    title.setAttribute('y', String(n.y + 20));
    title.setAttribute('fill', l.color);
    title.setAttribute('font-size', '12');
    title.setAttribute('font-weight', '600');
    title.setAttribute('text-anchor', 'middle');
    title.setAttribute('font-family', 'system-ui');
    title.textContent = n.label;
    g.appendChild(title);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', String(n.x + n.w / 2));
    sub.setAttribute('y', String(n.y + 34));
    sub.setAttribute('fill', l.color);
    sub.setAttribute('font-size', '9');
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('opacity', '0.6');
    sub.setAttribute('font-family', 'monospace');
    sub.textContent = n.subtitle.length > 22 ? n.subtitle.slice(0, 20) + '..' : n.subtitle;
    g.appendChild(sub);

    if (hasComment) {
      const count = state.comments.filter(function(c) { return c.target === n.id; }).length;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', String(n.x + n.w - 8));
      circle.setAttribute('cy', String(n.y + 8));
      circle.setAttribute('r', '5');
      circle.setAttribute('fill', '#f59e0b');
      circle.setAttribute('stroke', '#78350f');
      circle.setAttribute('stroke-width', '1');
      g.appendChild(circle);

      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      badge.setAttribute('x', String(n.x + n.w - 8));
      badge.setAttribute('y', String(n.y + 11));
      badge.setAttribute('fill', '#78350f');
      badge.setAttribute('font-size', '7');
      badge.setAttribute('text-anchor', 'middle');
      badge.setAttribute('font-weight', '700');
      badge.setAttribute('font-family', 'system-ui');
      badge.textContent = String(count);
      g.appendChild(badge);
    }

    svgEl.appendChild(g);
  });
}

function renderComments() {
  commentCountEl.textContent = '(' + state.comments.length + ')';
  while (commentsListEl.firstChild) commentsListEl.removeChild(commentsListEl.firstChild);

  if (state.comments.length === 0) {
    const p = document.createElement('p');
    p.style.fontSize = '12px';
    p.style.color = '#475569';
    p.style.marginTop = '4px';
    p.textContent = 'Click any component to add a comment.';
    commentsListEl.appendChild(p);
    return;
  }

  state.comments.forEach(function(c) {
    const item = document.createElement('div');
    item.className = 'comment-item';

    const del = document.createElement('button');
    del.className = 'comment-delete';
    del.textContent = '\u00d7';
    del.addEventListener('click', function() { deleteComment(c.id); });

    const target = document.createElement('div');
    target.className = 'comment-target';
    target.textContent = c.targetLabel;

    const file = document.createElement('div');
    file.className = 'comment-file';
    file.textContent = c.targetFile;

    const text = document.createElement('div');
    text.className = 'comment-text';
    text.textContent = c.text;

    item.appendChild(del);
    item.appendChild(target);
    item.appendChild(file);
    item.appendChild(text);
    commentsListEl.appendChild(item);
  });
}

function updatePrompt() {
  const visibleLayers = Object.entries(state.layers).filter(function([, v]) { return v; }).map(function([k]) { return LAYERS[k].label; });

  const parts = [];
  parts.push('This is the C2A Battery architecture for the ThriveIEP Accommodation Engine.');

  if (visibleLayers.length < Object.keys(LAYERS).length) {
    parts.push('Currently viewing: ' + visibleLayers.join(', ') + '.');
  }

  if (state.comments.length > 0) {
    parts.push('');
    parts.push('Feedback on specific components:');
    state.comments.forEach(function(c) {
      parts.push('');
      parts.push('**' + c.targetLabel + '** (' + c.targetFile + '):');
      parts.push(c.text);
    });
  } else {
    parts.push('');
    parts.push('No component comments yet. Click any node in the diagram to add feedback.');
  }

  promptOutput.textContent = parts.join('\n');
}

function updateAll() {
  renderControls();
  renderDiagram();
  renderComments();
  updatePrompt();
}

// ── Interactions ──────────────────────────────────────────────────

function setPreset(key) {
  state.preset = key;
  state.layers = Object.assign({}, PRESETS[key].layers);
  updateAll();
}

function toggleLayer(key) {
  state.layers[key] = !state.layers[key];
  state.preset = '';
  updateAll();
}

function toggleConn(key) {
  state.connTypes[key] = !state.connTypes[key];
  updateAll();
}

function showTooltip(event, nodeId) {
  const n = nodes.find(function(nd) { return nd.id === nodeId; });
  if (!n) return;
  document.getElementById('tt-label').textContent = n.label;
  document.getElementById('tt-file').textContent = n.subtitle;
  document.getElementById('tt-desc').textContent = n.desc;
  tooltipEl.classList.add('active');
  tooltipEl.style.left = (event.clientX + 16) + 'px';
  tooltipEl.style.top = (event.clientY - 10) + 'px';
}

function hideTooltip() {
  tooltipEl.classList.remove('active');
}

function openModal(nodeId) {
  const n = nodes.find(function(nd) { return nd.id === nodeId; });
  if (!n) return;
  state.modalNode = n;
  modalTitle.textContent = n.label;
  modalFile.textContent = n.subtitle;
  modalTextarea.value = '';
  commentModal.classList.add('active');
  setTimeout(function() { modalTextarea.focus(); }, 50);
}

function closeModal() {
  commentModal.classList.remove('active');
  state.modalNode = null;
}

function saveComment() {
  const text = modalTextarea.value.trim();
  if (!text || !state.modalNode) return;
  state.comments.push({
    id: Date.now(),
    target: state.modalNode.id,
    targetLabel: state.modalNode.label,
    targetFile: state.modalNode.subtitle,
    text: text
  });
  closeModal();
  updateAll();
}

function deleteComment(id) {
  state.comments = state.comments.filter(function(c) { return c.id !== id; });
  updateAll();
}

function zoomDiagram(delta) {
  state.zoom = Math.max(0.3, Math.min(3, state.zoom + delta));
  svgEl.style.transform = 'scale(' + state.zoom + ')';
  svgEl.style.transformOrigin = 'center center';
}

function resetZoom() {
  state.zoom = 1;
  svgEl.style.transform = '';
}

function copyPrompt() {
  const text = promptOutput.textContent;
  navigator.clipboard.writeText(text).then(function() {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(function() { copyBtn.textContent = 'Copy Prompt'; copyBtn.classList.remove('copied'); }, 1500);
  });
}

// ── Event listeners ───────────────────────────────────────────────

document.getElementById('zoom-in').addEventListener('click', function() { zoomDiagram(0.1); });
document.getElementById('zoom-out').addEventListener('click', function() { zoomDiagram(-0.1); });
document.getElementById('zoom-reset').addEventListener('click', resetZoom);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-save-btn').addEventListener('click', saveComment);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// Init
updateAll();
</script>
</body>
</html>
